<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TBI / Concussion Tracker</title>
  <script>
    // Suppress Babel browser warning before it loads
    window.BABEL_DISABLE_CACHE = 1;
    // Override console.warn to suppress Babel's "in-browser" warning
    const _warn = console.warn.bind(console);
    console.warn = (...args) => {
      if (args[0] && typeof args[0] === 'string' && args[0].includes('Babel')) return;
      _warn(...args);
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Georgia,serif;background:#eef0f5}
    #root{min-height:100vh}
    #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;color:#3d4f8a;font-size:1.1rem}
    /* Hide any Babel warning overlays */
    [style*="background: yellow"], [style*="background:yellow"],
    [style*="background-color: yellow"], [style*="background-color:yellow"] {
      display:none!important;
    }
  </style>
</head>
<body>
  <div id="loading">Loading TBI Tracker...</div>
  <div id="root"></div>
  <script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect } = React;

const SYMPTOMS = [
{ cat: “General Symptoms”, items: [“Headache or pressure”,“Nausea or vomiting”,“Dizziness or loss of balance”,“Blurred or double vision”,“Sensitivity to light or noise”,“Loss of consciousness”,“Feeling dazed or foggy”,“Memory gaps around injury”,“Persistent or worsening headache”,“Repeated vomiting”,“Seizures or convulsions”,“Weakness or numbness in limbs”,“Loss of coordination”,“Slurred speech”,“Profound confusion or agitation”,“Inability to recognize people or places”,“Unequal pupil size”] },
{ cat: “Cognitive & Mental”, items: [“Difficulty concentrating”,“Memory problems”,“Slowed thinking or processing”,“Confusion or disorientation”,“Difficulty with problem-solving”] },
{ cat: “Emotional & Behavioral”, items: [“Mood swings or irritability”,“Anxiety or depression”,“Increased aggression”,“Emotional numbness”,“Impulsivity”] },
{ cat: “Sleep-Related”, items: [“Sleeping more or less than usual”,“Insomnia”,“Fatigue and drowsiness”] },
{ cat: “Sensory”, items: [“Ringing in the ears (tinnitus)”,“Changes in smell or taste”,“Visual disturbances”,“Hearing loss”] },
];
const SEVS = [“Mild”,“Moderate”,“Severe”];
const SEV_HEX = {Mild:”#f59e0b”,Moderate:”#ea580c”,Severe:”#dc2626”};
const SEV_COL = {Mild:{bg:”#fef3c7”,bd:”#f59e0b”,tx:”#92400e”},Moderate:{bg:”#fed7aa”,bd:”#ea580c”,tx:”#7c2d12”},Severe:{bg:”#fecaca”,bd:”#dc2626”,tx:”#7f1d1d”}};
const MOODS = [“😊 Good”,“🙂 Okay”,“😐 Neutral”,“😔 Low”,“😞 Poor”];
const ENERGY = [“⚡ High”,“🔋 Normal”,“🪫 Low”,“😴 Exhausted”];
const LT = { bg:”#eef0f5”,sur:”#f8f9fc”,bdr:”#d4d9e8”,bdrM:”#c2c8da”,tx:”#1e2438”,txM:”#3d4663”,txMu:”#6b75a0”,txF:”#a8b0cc”,acc:”#3d4f8a”,accL:”#e8ebf5”,accB:”#4a5fa8”,hdrBg:”#1e2d4a”,hdrTx:”#e8ecf8”,hdrSub:”#8fa0cc”,secH:”#e8ebf5”,secHT:”#2a3660”,inBg:”#f8f9fc”,inBd:”#d4d9e8”,prBg:”#d4d9e8”,prFl:“linear-gradient(90deg,#4a5fa8,#7b8fd4)”,sh:“rgba(30,40,80,0.06)”,hn:”#e8ebf5”,hm:”#eef0f8”,hmo:”#dde2f5”,hs:”#f5e0e0”,wBg:”#eef0f8”,wBd:”#7b8fd4” };
const DT = { bg:”#111620”,sur:”#181e2e”,bdr:”#272f48”,bdrM:”#313a56”,tx:”#dde2f0”,txM:”#a0aac8”,txMu:”#626e96”,txF:”#363f5c”,acc:”#5c70b8”,accL:”#1a2040”,accB:”#6b82d4”,hdrBg:”#0d1220”,hdrTx:”#dde2f0”,hdrSub:”#6878a8”,secH:”#181e2e”,secHT:”#a0aac8”,inBg:”#0d1220”,inBd:”#272f48”,prBg:”#272f48”,prFl:“linear-gradient(90deg,#4a5fa8,#6b82d4)”,sh:“rgba(0,0,0,0.3)”,hn:”#181e2e”,hm:”#1a2038”,hmo:”#1e2440”,hs:”#2a1a1a”,wBg:”#181e30”,wBd:”#4a5fa8” };

const toKey = d => d.toISOString().split(“T”)[0];
const parseKey = k => new Date(k+“T12:00:00”);
const fmtShort = d => d.toLocaleDateString(“en-US”,{month:“short”,day:“numeric”,year:“numeric”});
const fmtFull = d => d.toLocaleDateString(“en-US”,{weekday:“long”,year:“numeric”,month:“long”,day:“numeric”});
const topSev = dd => { if(!dd?.severity) return null; const v=Object.values(dd.severity); return v.includes(“Severe”)?“Severe”:v.includes(“Moderate”)?“Moderate”:v.includes(“Mild”)?“Mild”:null; };
const cntChk = dd => !dd?.checked ? 0 : Object.values(dd.checked).filter(Boolean).length;

const S = {
PF: “Playfair Display, Georgia, serif”,
SS: “Source Serif 4, Georgia, serif”,
};

function Cal({allData, selKey, onSelect, T, heat=false}) {
const today = new Date();
const [vy, setVy] = useState(today.getFullYear());
const [vm, setVm] = useState(today.getMonth());
const first = new Date(vy, vm, 1);
const cells = […Array(first.getDay()).fill(null), …Array(new Date(vy,vm+1,0).getDate()).fill(0).map((_,i)=>new Date(vy,vm,i+1))];
const isFut = d => { const t=new Date(); t.setHours(0,0,0,0); return d>t; };
const heatClr = d => { const dd=allData[toKey(d)]; if(!dd||!cntChk(dd)) return T.hn; const s=topSev(dd); return s===“Severe”?T.hs:s===“Moderate”?T.hmo:s===“Mild”?T.hm:T.hn; };
const navBtn = (lbl, fn) => (
<button onClick={fn} style={{background:“none”,border:`1.5px solid ${T.bdrM}`,borderRadius:“50%”,width:30,height:30,cursor:“pointer”,color:T.txM,fontSize:“1rem”,display:“flex”,alignItems:“center”,justifyContent:“center”}}>{lbl}</button>
);
return (
<div style={{background:T.sur,border:`1px solid ${T.bdr}`,borderRadius:14,padding:“16px 14px”,marginBottom:18,boxShadow:`0 1px 8px ${T.sh}`}}>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”,marginBottom:12}}>
{navBtn(”‹”, ()=>vm===0?(setVm(11),setVy(y=>y-1)):setVm(m=>m-1))}
<div style={{textAlign:“center”}}>
<div style={{fontFamily:S.PF,fontWeight:600,color:T.tx,fontSize:“0.95rem”}}>{first.toLocaleDateString(“en-US”,{month:“long”,year:“numeric”})}</div>
{heat && <div style={{fontSize:“0.65rem”,color:T.txMu,marginTop:1}}>Severity Heat Map</div>}
</div>
{navBtn(”›”, ()=>vm===11?(setVm(0),setVy(y=>y+1)):setVm(m=>m+1))}
</div>
<div style={{display:“grid”,gridTemplateColumns:“repeat(7,1fr)”,gap:3,marginBottom:4}}>
{[“Su”,“Mo”,“Tu”,“We”,“Th”,“Fr”,“Sa”].map(d=><div key={d} style={{textAlign:“center”,fontSize:“0.68rem”,color:T.txMu,fontWeight:600}}>{d}</div>)}
</div>
<div style={{display:“grid”,gridTemplateColumns:“repeat(7,1fr)”,gap:3}}>
{cells.map((date,i) => {
if (!date) return <div key={“p”+i}/>;
const k=toKey(date), isSel=k===selKey, fut=isFut(date), isToday=k===toKey(new Date());
const dd=allData[k], has=!!(dd?.checked&&Object.values(dd.checked).some(Boolean)), sev=topSev(dd);
return (
<button key={k} onClick={()=>!fut&&onSelect(date)}
style={{position:“relative”,background:isSel?T.accB:heat&&has?heatClr(date):isToday?T.accL:“transparent”,
color:isSel?”#fff”:fut?T.txF:T.tx,
border:isToday&&!isSel?`1.5px solid ${T.accB}`:`1.5px solid ${heat&&has?T.bdr:"transparent"}`,
borderRadius:7,padding:“4px 2px”,cursor:fut?“not-allowed”:“pointer”,fontSize:“0.8rem”,fontWeight:isToday?700:400,minHeight:32,transition:“all 0.15s”,outline:“none”}}>
{date.getDate()}
{!heat&&has&&<span style={{position:“absolute”,bottom:2,left:“50%”,transform:“translateX(-50%)”,width:4,height:4,borderRadius:“50%”,background:isSel?”#fff”:sev?SEV_HEX[sev]:”#4a5fa8”,display:“block”}}/>}
</button>
);
})}
</div>
<div style={{marginTop:10,display:“flex”,gap:10,flexWrap:“wrap”,justifyContent:“center”}}>
{heat
? [[“No data”,T.hn],[“Mild”,T.hm],[“Moderate”,T.hmo],[“Severe”,T.hs]].map(([l,c])=><div key={l} style={{display:“flex”,alignItems:“center”,gap:3,fontSize:“0.68rem”,color:T.txMu}}><span style={{width:11,height:11,borderRadius:2,background:c,border:`1px solid ${T.bdr}`,display:“inline-block”}}/>{l}</div>)
: [[“Mild”,”#f59e0b”],[“Moderate”,”#ea580c”],[“Severe”,”#dc2626”],[“Logged”,”#4a5fa8”]].map(([l,c])=><div key={l} style={{display:“flex”,alignItems:“center”,gap:3,fontSize:“0.68rem”,color:T.txMu}}><span style={{width:6,height:6,borderRadius:“50%”,background:c,display:“inline-block”}}/>{l}</div>)
}
</div>
</div>
);
}

function MoodRow({mood, energy, onMood, onEnergy, T}) {
const pill = (val, cur, fn) => (
<button onClick={fn} style={{padding:“4px 11px”,borderRadius:99,border:`1.5px solid ${cur===val?T.accB:T.bdrM}`,background:cur===val?T.accL:“transparent”,color:cur===val?T.acc:T.txM,fontSize:“0.75rem”,cursor:“pointer”,transition:“all 0.15s”,outline:“none”}}>{val}</button>
);
return (
<div style={{background:T.sur,border:`1px solid ${T.bdr}`,borderRadius:12,padding:“13px 16px”,marginBottom:16,boxShadow:`0 1px 4px ${T.sh}`}}>
<div style={{fontFamily:S.PF,fontSize:“0.88rem”,fontWeight:600,color:T.tx,marginBottom:10}}>How are you feeling today?</div>
<div style={{marginBottom:8}}>
<div style={{fontSize:“0.68rem”,color:T.txMu,marginBottom:5,fontWeight:600}}>MOOD</div>
<div style={{display:“flex”,flexWrap:“wrap”,gap:5}}>{MOODS.map(m=>pill(m,mood,()=>onMood(mood===m?null:m)))}</div>
</div>
<div>
<div style={{fontSize:“0.68rem”,color:T.txMu,marginBottom:5,fontWeight:600}}>ENERGY</div>
<div style={{display:“flex”,flexWrap:“wrap”,gap:5}}>{ENERGY.map(e=>pill(e,energy,()=>onEnergy(energy===e?null:e)))}</div>
</div>
</div>
);
}

function MedTab({meds, setMeds, medLogs, setMedLogs, dk, T}) {
const [showAdd, setShowAdd] = useState(false);
const [nm, setNm] = useState({name:””,dosage:””,frequency:””,notes:””});
const [seId, setSeId] = useState(null);
const [seText, setSeText] = useState(””);
const iStyle = {width:“100%”,background:T.inBg,border:`1px solid ${T.inBd}`,borderRadius:8,padding:“8px 11px”,fontFamily:S.SS,fontSize:“0.86rem”,color:T.tx,outline:“none”,boxSizing:“border-box”};
const addMed = () => { if(!nm.name.trim()) return; setMeds(p=>[…p,{id:Date.now(),…nm}]); setNm({name:””,dosage:””,frequency:””,notes:””}); setShowAdd(false); };
const toggleTaken = id => setMedLogs(p=>{ const d={…(p[dk]||{})}; d[id]={…(d[id]||{}),taken:!d[id]?.taken}; return {…p,[dk]:d}; });
const saveSE = id => { setMedLogs(p=>{ const d={…(p[dk]||{})}; d[id]={…(d[id]||{}),sideEffects:seText}; return {…p,[dk]:d}; }); setSeId(null); setSeText(””); };
return (
<div>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:14}}>
<div style={{fontFamily:S.PF,fontSize:“1rem”,fontWeight:600,color:T.tx}}>Medications</div>
<button onClick={()=>setShowAdd(v=>!v)} style={{background:T.accB,color:”#fff”,border:“none”,borderRadius:8,padding:“6px 14px”,fontFamily:S.PF,fontSize:“0.8rem”,cursor:“pointer”}}>+ Add</button>
</div>
{showAdd && (
<div style={{background:T.sur,border:`1px solid ${T.bdr}`,borderRadius:12,padding:14,marginBottom:14}}>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:8,marginBottom:8}}>
<div><div style={{fontSize:“0.68rem”,color:T.txMu,marginBottom:3}}>NAME *</div><input style={iStyle} placeholder=“e.g. Ibuprofen” value={nm.name} onChange={e=>setNm(v=>({…v,name:e.target.value}))}/></div>
<div><div style={{fontSize:“0.68rem”,color:T.txMu,marginBottom:3}}>DOSAGE</div><input style={iStyle} placeholder=“e.g. 400mg” value={nm.dosage} onChange={e=>setNm(v=>({…v,dosage:e.target.value}))}/></div>
</div>
<div style={{marginBottom:8}}><div style={{fontSize:“0.68rem”,color:T.txMu,marginBottom:3}}>FREQUENCY</div><input style={iStyle} placeholder=“e.g. Twice daily” value={nm.frequency} onChange={e=>setNm(v=>({…v,frequency:e.target.value}))}/></div>
<div style={{marginBottom:10}}><div style={{fontSize:“0.68rem”,color:T.txMu,marginBottom:3}}>NOTES</div><input style={iStyle} placeholder=“Prescribing doctor, instructions…” value={nm.notes} onChange={e=>setNm(v=>({…v,notes:e.target.value}))}/></div>
<div style={{display:“flex”,gap:8}}>
<button onClick={addMed} style={{background:T.accB,color:”#fff”,border:“none”,borderRadius:7,padding:“7px 18px”,fontFamily:S.PF,fontSize:“0.82rem”,cursor:“pointer”}}>Save</button>
<button onClick={()=>setShowAdd(false)} style={{background:“none”,border:`1px solid ${T.bdr}`,borderRadius:7,padding:“7px 14px”,fontSize:“0.82rem”,cursor:“pointer”,color:T.txMu}}>Cancel</button>
</div>
</div>
)}
{meds.length===0
? <div style={{background:T.sur,border:`1px solid ${T.bdr}`,borderRadius:12,padding:28,textAlign:“center”,color:T.txMu,fontFamily:S.SS,fontSize:“0.88rem”,fontStyle:“italic”}}>No medications added yet.</div>
: meds.map(med => {
const log = medLogs[dk]?.[med.id]||{};
return (
<div key={med.id} style={{background:T.sur,border:`1px solid ${log.taken?T.accB:T.bdr}`,borderRadius:12,overflow:“hidden”,marginBottom:10}}>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”,padding:“11px 14px”,background:log.taken?T.accL:T.secH}}>
<div>
<div style={{fontFamily:S.PF,fontSize:“0.9rem”,fontWeight:600,color:T.tx}}>{med.name}</div>
<div style={{fontSize:“0.75rem”,color:T.txMu,marginTop:1}}>{med.dosage}{med.dosage&&med.frequency?” · “:””}{med.frequency}</div>
</div>
<div style={{display:“flex”,gap:6}}>
<button onClick={()=>toggleTaken(med.id)} style={{background:log.taken?”#22c55e”:“transparent”,color:log.taken?”#fff”:T.txMu,border:`1.5px solid ${log.taken?"#22c55e":T.bdrM}`,borderRadius:99,padding:“3px 12px”,fontSize:“0.72rem”,fontWeight:600,cursor:“pointer”,outline:“none”}}>{log.taken?“✓ Taken”:“Mark Taken”}</button>
<button onClick={()=>setMeds(p=>p.filter(m=>m.id!==med.id))} style={{background:“none”,border:“none”,color:T.txF,cursor:“pointer”,fontSize:“0.9rem”}}>✕</button>
</div>
</div>
{med.notes && <div style={{padding:“7px 14px”,fontSize:“0.75rem”,color:T.txMu,borderTop:`1px solid ${T.bdr}`}}>📝 {med.notes}</div>}
<div style={{padding:“7px 14px”,borderTop:`1px solid ${T.bdr}`}}>
<button onClick={()=>{setSeId(seId===med.id?null:med.id); setSeText(log.sideEffects||””);}} style={{fontSize:“0.72rem”,color:log.sideEffects?T.acc:T.txMu,background:“none”,border:`1px solid ${T.bdr}`,borderRadius:6,padding:“2px 9px”,cursor:“pointer”,outline:“none”}}>
{log.sideEffects ? “⚠ Side effects logged” : “+ Log side effects”}
</button>
</div>
{seId===med.id && (
<div style={{padding:“9px 14px”,borderTop:`1px solid ${T.bdr}`}}>
<textarea style={{width:“100%”,background:T.inBg,border:`1px solid ${T.inBd}`,borderRadius:7,padding:“7px 10px”,fontFamily:S.SS,fontSize:“0.83rem”,color:T.tx,resize:“vertical”,minHeight:55,outline:“none”,boxSizing:“border-box”}} placeholder=“Describe side effects…” value={seText} onChange={e=>setSeText(e.target.value)}/>
<div style={{display:“flex”,gap:7,marginTop:5}}>
<button onClick={()=>saveSE(med.id)} style={{background:T.accB,color:”#fff”,border:“none”,borderRadius:6,padding:“5px 14px”,fontSize:“0.78rem”,cursor:“pointer”}}>Save</button>
<button onClick={()=>setSeId(null)} style={{background:“none”,border:`1px solid ${T.bdr}`,borderRadius:6,padding:“5px 10px”,fontSize:“0.78rem”,cursor:“pointer”,color:T.txMu}}>Cancel</button>
</div>
</div>
)}
</div>
);
})
}
</div>
);
}

function ApptTab({appts, setAppts, T}) {
const [show, setShow] = useState(false);
const [editId, setEditId] = useState(null);
const [f, setF] = useState({date:””,time:””,provider:””,type:””,location:””,notes:””});
const iStyle = {width:“100%”,background:T.inBg,border:`1px solid ${T.inBd}`,borderRadius:8,padding:“8px 11px”,fontFamily:S.SS,fontSize:“0.86rem”,color:T.tx,outline:“none”,boxSizing:“border-box”};
const openForm = a => { setF(a?{…a}:{date:””,time:””,provider:””,type:””,location:””,notes:””}); setEditId(a?a.id:null); setShow(true); };
const save = () => { if(!f.date||!f.provider) return; editId ? setAppts(p=>p.map(a=>a.id===editId?{…f,id:editId,completed:a.completed}:a)) : setAppts(p=>[…p,{…f,id:Date.now(),completed:false}]); setShow(false); };
const toggle = id => setAppts(p=>p.map(a=>a.id===id?{…a,completed:!a.completed}:a));
const remove = id => setAppts(p=>p.filter(a=>a.id!==id));
const upcoming = appts.filter(a=>!a.completed).sort((a,b)=>a.date.localeCompare(b.date));
const past = appts.filter(a=>a.completed).sort((a,b)=>b.date.localeCompare(a.date));
const Card = ({a}) => {
const d = a.date ? new Date(a.date+“T12:00:00”) : null;
return (
<div style={{background:T.sur,border:`1px solid ${a.completed?T.bdrM:T.accB}`,borderRadius:12,marginBottom:8,overflow:“hidden”,opacity:a.completed?0.7:1}}>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”,padding:“10px 14px”,background:a.completed?T.secH:T.accL}}>
<div>
<div style={{fontFamily:S.PF,fontSize:“0.9rem”,fontWeight:600,color:T.tx,textDecoration:a.completed?“line-through”:“none”}}>{a.provider}{a.type&&<span style={{fontWeight:400,color:T.txMu}}> — {a.type}</span>}</div>
<div style={{fontSize:“0.72rem”,color:T.txMu,marginTop:2}}>{d&&d.toLocaleDateString(“en-US”,{weekday:“short”,month:“short”,day:“numeric”,year:“numeric”})}{a.time&&` at ${a.time}`}</div>
</div>
<div style={{display:“flex”,gap:5}}>
<button onClick={()=>toggle(a.id)} style={{fontSize:“0.7rem”,background:a.completed?“transparent”:”#22c55e”,color:a.completed?T.txMu:”#fff”,border:`1px solid ${a.completed?T.bdr:"#22c55e"}`,borderRadius:5,padding:“3px 8px”,cursor:“pointer”,outline:“none”}}>{a.completed?“↩ Undo”:“✓ Done”}</button>
<button onClick={()=>openForm(a)} style={{fontSize:“0.7rem”,background:“none”,color:T.txMu,border:`1px solid ${T.bdr}`,borderRadius:5,padding:“3px 7px”,cursor:“pointer”,outline:“none”}}>Edit</button>
<button onClick={()=>remove(a.id)} style={{background:“none”,border:“none”,color:T.txF,cursor:“pointer”,fontSize:“0.88rem”}}>✕</button>
</div>
</div>
{(a.location||a.notes) && (
<div style={{padding:“7px 14px”,borderTop:`1px solid ${T.bdr}`}}>
{a.location && <div style={{fontSize:“0.75rem”,color:T.txMu}}>📍 {a.location}</div>}
{a.notes && <div style={{fontSize:“0.75rem”,color:T.txMu,fontStyle:“italic”,marginTop:a.location?3:0}}>📝 {a.notes}</div>}
</div>
)}
</div>
);
};
return (
<div>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:14}}>
<div style={{fontFamily:S.PF,fontSize:“1rem”,fontWeight:600,color:T.tx}}>Doctor Appointments</div>
<button onClick={()=>openForm(null)} style={{background:T.accB,color:”#fff”,border:“none”,borderRadius:8,padding:“6px 14px”,fontFamily:S.PF,fontSize:“0.8rem”,cursor:“pointer”}}>+ Add</button>
</div>
{show && (
<div style={{background:T.sur,border:`1px solid ${T.bdr}`,borderRadius:12,padding:14,marginBottom:14}}>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:8,marginBottom:8}}>
<div><div style={{fontSize:“0.68rem”,color:T.txMu,marginBottom:3}}>DATE *</div><input type=“date” style={iStyle} value={f.date} onChange={e=>setF(v=>({…v,date:e.target.value}))}/></div>
<div><div style={{fontSize:“0.68rem”,color:T.txMu,marginBottom:3}}>TIME</div><input type=“time” style={iStyle} value={f.time} onChange={e=>setF(v=>({…v,time:e.target.value}))}/></div>
</div>

function TrendChart({allData, tbiDate, T}) {
const SEV_SCORE = {Mild:1, Moderate:2, Severe:3};
const startDate = tbiDate ? parseKey(tbiDate) : null;
const allKeys = Object.keys(allData).filter(k=>cntChk(allData[k])>0).sort();
if (!allKeys.length || !startDate) return (
<div style={{textAlign:“center”,padding:“28px 16px”,color:T.txMu,fontFamily:S.SS,fontSize:“0.85rem”,fontStyle:“italic”}}>
{!startDate ? “Enter your TBI date in Patient Info to see your trend chart.” : “No symptom data logged yet.”}
</div>
);

// Build daily data points from TBI date to today
const today = new Date(); today.setHours(0,0,0,0);
const points = [];
const cur = new Date(startDate); cur.setHours(0,0,0,0);
while (cur <= today) {
const k = toKey(cur);
const dd = allData[k];
let score = 0, cnt = 0;
if (dd?.checked) {
Object.entries(dd.checked).forEach(([key, on]) => {
if (on) { cnt++; const sev = dd.severity?.[key]; score += SEV_SCORE[sev] || 1; }
});
}
points.push({k, date: new Date(cur), score: cnt > 0 ? score / cnt : null, cnt});
cur.setDate(cur.getDate() + 1);
}

// Only plot days with data, but keep x-axis spanning full range
const W = 680, H = 160, PL = 36, PR = 16, PT = 12, PB = 32;
const cW = W - PL - PR, cH = H - PT - PB;
const maxScore = 3;
const totalDays = points.length - 1 || 1;

const toX = i => PL + (i / totalDays) * cW;
const toY = v => PT + cH - (v / maxScore) * cH;

const dataPoints = points.map((p, i) => ({…p, x: toX(i), y: p.score !== null ? toY(p.score) : null}));
const plotted = dataPoints.filter(p => p.score !== null);

// Build SVG path through data points
const pathD = plotted.length > 1
? plotted.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(” “)
: null;
const areaD = pathD ? `${pathD} L${plotted[plotted.length-1].x.toFixed(1)},${(PT+cH).toFixed(1)} L${plotted[0].x.toFixed(1)},${(PT+cH).toFixed(1)} Z` : null;

// X-axis labels: show ~5 evenly spaced dates
const labelCount = Math.min(5, points.length);
const labelIdxs = Array.from({length:labelCount},(_,i)=>Math.round(i*(points.length-1)/(labelCount-1||1)));
const fmtAxisDate = d => d.toLocaleDateString(“en-US”,{month:“short”,day:“numeric”});

// 7-day rolling average
const rolling = dataPoints.map((p, i) => {
const window = dataPoints.slice(Math.max(0,i-3), i+4).filter(x=>x.score!==null);
if (!window.length) return {…p, avg: null};
return {…p, avg: window.reduce((s,x)=>s+x.score,0)/window.length};
});
const avgPath = rolling.filter(p=>p.avg!==null).map((p,i,arr)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${toY(p.avg).toFixed(1)}`).join(” “);

const [hov, setHov] = useState(null);

return (
<div style={{position:“relative”}}>
<svg width=“100%” viewBox={`0 0 ${W} ${H}`} style={{overflow:“visible”,display:“block”}}>
<defs>
<linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stopColor={T.accB} stopOpacity="0.25"/>
<stop offset="100%" stopColor={T.accB} stopOpacity="0.02"/>
</linearGradient>
</defs>
{/* Grid lines */}
{[1,2,3].map(v=>(
<line key={v} x1={PL} y1={toY(v)} x2={W-PR} y2={toY(v)} stroke={T.bdr} strokeWidth="1" strokeDasharray="4,3"/>
))}
{/* Y labels */}
{[[“Mild”,1,”#f59e0b”],[“Mod”,2,”#ea580c”],[“Sev”,3,”#dc2626”]].map(([l,v,c])=>(
<text key={l} x={PL-4} y={toY(v)+4} textAnchor="end" fontSize="9" fill={c} fontFamily="Georgia,serif">{l}</text>
))}
{/* Area fill */}
{areaD && <path d={areaD} fill="url(#trendGrad)"/>}
{/* Main line */}
{pathD && <path d={pathD} fill="none" stroke={T.accB} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.5"/>}
{/* Rolling average */}
{avgPath && <path d={avgPath} fill="none" stroke={T.accB} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
{/* Data dots */}
{plotted.map((p,i)=>(
<circle key={p.k} cx={p.x} cy={p.y} r={hov===p.k?5:3}
fill={p.score>=2.5?”#dc2626”:p.score>=1.5?”#ea580c”:”#f59e0b”}
stroke={T.sur} strokeWidth=“1.5” style={{cursor:“pointer”,transition:“r 0.1s”}}
onMouseEnter={()=>setHov(p.k)} onMouseLeave={()=>setHov(null)}/>
))}
{/* Hover tooltip */}
{hov && (() => { const p=dataPoints.find(x=>x.k===hov); if(!p||p.score===null) return null;
const tx = Math.min(Math.max(p.x, PL+40), W-PR-40);
return (
<g>
<rect x={tx-40} y={p.y-34} width={80} height={28} rx={5} fill={T.sur} stroke={T.bdr} strokeWidth="1"/>
<text x={tx} y={p.y-22} textAnchor="middle" fontSize="9" fill={T.txMu} fontFamily="Georgia,serif">{fmtAxisDate(p.date)}</text>
<text x={tx} y={p.y-11} textAnchor="middle" fontSize="10" fontWeight="600" fill={T.tx} fontFamily="Georgia,serif">{p.cnt} symptom{p.cnt!==1?“s”:””}</text>
</g>
);
})()}
{/* X-axis labels */}
{labelIdxs.map(i=>(
<text key={i} x={toX(i)} y={H-4} textAnchor="middle" fontSize="9" fill={T.txMu} fontFamily="Georgia,serif">{fmtAxisDate(points[i].date)}</text>
))}
{/* Today line */}
<line x1={toX(points.length-1)} y1={PT} x2={toX(points.length-1)} y2={PT+cH} stroke={T.accB} strokeWidth="1" strokeDasharray="3,3" opacity="0.5"/>
</svg>
<div style={{display:“flex”,gap:14,marginTop:6,justifyContent:“flex-end”}}>
<div style={{display:“flex”,alignItems:“center”,gap:4,fontSize:“0.68rem”,color:T.txMu}}><span style={{width:16,height:2,background:T.accB,opacity:0.5,display:“inline-block”,borderRadius:1}}/> Daily</div>
<div style={{display:“flex”,alignItems:“center”,gap:4,fontSize:“0.68rem”,color:T.txMu}}><span style={{width:16,height:3,background:T.accB,display:“inline-block”,borderRadius:1}}/> 7-day trend</div>
</div>
</div>
);
}

const LS_KEY = “tbi_tracker_v2”;
function loadLS() {
try {
const d=localStorage.getItem(LS_KEY);
if (!d) return null;
const parsed = JSON.parse(d);
// Clear stray single-character name entries from accidental keystrokes
if (parsed?.info?.name && parsed.info.name.trim().length <= 1) {
parsed.info.name = “”;
}
return parsed;
} catch(e) { return null; }
}
function saveLS(data) {
try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

  <script>
    // Remove any warning elements Babel injects after load
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.querySelectorAll('body > *').forEach(el => {
          const bg = window.getComputedStyle(el).backgroundColor;
          if (el.id !== 'root' && el.id !== 'loading') {
            const text = el.innerText || '';
            if (text.includes('Babel') || text.includes('transform') || text.includes('production')) {
              el.remove();
            }
          }
        });
      }, 2000);
    });
  </script>
