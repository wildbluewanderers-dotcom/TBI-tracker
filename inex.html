function Cal({allData,selKey,onSelect,T,heat=false}){
const today=new Date();
const [vy,setVy]=useState(today.getFullYear());
const [vm,setVm]=useState(today.getMonth());

const cells=Array(first.getDay()).fill(null).concat(Array(new Date(vy,vm+1,0).getDate()).fill(0).map((_,i)=>new Date(vy,vm,i+1)));
const isFut=d=>{const t=new Date();t.setHours(0,0,0,0);return d>t;};
const heatClr=d=>{const dd=allData[toKey(d)];if(!dd||!cntChk(dd))return T.hn;const s=topSev(dd);return s===“Severe”?T.hs:s===“Moderate”?T.hmo:s===“Mild”?T.hm:T.hn;};

return h(‘div’,{style:{background:T.sur,border:“1px solid “+(T.bdr),borderRadius:14,padding:“16px 14px”,marginBottom:18,boxShadow:“0 1px 8px “+(T.sh)}},
h(‘div’,{style:{display:“flex”,alignItems:“center”,justifyContent:“space-between”,marginBottom:12}},
navBtn(”‹”,()=>vm===0?(setVm(11),setVy(y=>y-1)):setVm(m=>m-1)),
h(‘div’,{style:{textAlign:“center”}},
h(‘div’,{style:{fontFamily:PF,fontWeight:600,color:T.tx,fontSize:“0.95rem”}},first.toLocaleDateString(“en-US”,{month:“long”,year:“numeric”})),
heat&&h(‘div’,{style:{fontSize:“0.65rem”,color:T.txMu,marginTop:1}},“Severity Heat Map”)
),
navBtn(”›”,()=>vm===11?(setVm(0),setVy(y=>y+1)):setVm(m=>m+1))
),

),
h(‘div’,{style:{display:“grid”,gridTemplateColumns:“repeat(7,1fr)”,gap:3}},
cells.map((date,i)=>{
if(!date)return h(‘div’,{key:“p”+i});
const k=toKey(date),isSel=k===selKey,fut=isFut(date),isToday=k===toKey(new Date());
const dd=allData[k],has=!!(dd?.checked&&Object.values(dd.checked).some(Boolean)),sev=topSev(dd);
return h(‘button’,{key:k,onClick:()=>!fut&&onSelect(date),style:{position:“relative”,background:isSel?T.accB:heat&&has?heatClr(date):isToday?T.accL:“transparent”,color:isSel?”#fff”:fut?T.txF:T.tx,border:isToday&&!isSel?“1.5px solid “+(T.accB):“1.5px solid “+(heat&&has?T.bdr:“transparent”),borderRadius:7,padding:“4px 2px”,cursor:fut?“not-allowed”:“pointer”,fontSize:“0.8rem”,fontWeight:isToday?700:400,minHeight:32,transition:“all 0.15s”,outline:“none”}},
date.getDate(),

);
})

h(‘div’,{style:{marginTop:10,display:“flex”,gap:10,flexWrap:“wrap”,justifyContent:“center”}},
heat

h(‘div’,{style:{display:“flex”,gap:8}},

h(‘button’,{onClick:()=>setShowAdd(false),style:{background:“none”,border:“1px solid “+(T.bdr),borderRadius:7,padding:“7px 14px”,fontSize:“0.82rem”,cursor:“pointer”,color:T.txMu}},“Cancel”)
)

return h(‘div’,{key:med.id,style:{background:T.sur,border:“1px solid “+(log.taken?T.accB:T.bdr),borderRadius:12,overflow:“hidden”,marginBottom:10}},
h(‘div’,{style:{display:“flex”,alignItems:“center”,justifyContent:“space-between”,padding:“11px 14px”,background:log.taken?T.accL:T.secH}},
